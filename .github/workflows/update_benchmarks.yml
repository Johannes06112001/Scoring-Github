name: Update Top-100 Benchmarks

on:
  schedule:
    - cron: "0 4 * * 1"       # Monday 04:00 UTC
    - cron: "0 4 * * 4"       # Thursday 04:00 UTC
  push:
    branches: [main]
    paths:
      - "scripts/fetch_top100.py"
      - ".github/workflows/update_benchmarks.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run fetch_top100.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/fetch_top100.py

      - name: Commit benchmarks.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/benchmarks.json
          git diff --cached --quiet || git commit -m "chore: update Top-100 benchmarks [skip ci]"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: ".github,scripts,README.md"
